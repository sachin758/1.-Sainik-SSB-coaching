  <div class="admin-login-card">
    <button class="close-x" id="studentCloseBtn" aria-label="Close">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div class="admin-badge-row">
      <span class="brand-badge">GVC</span>
      <span class="brand-text" style="color:var(--ink);">STUDENT<span style="color:var(--ink-soft);">Portal</span></span>
    </div>
    <h3 id="studentModalTitle">Student Login</h3>
    <p class="sub" id="studentModalSub">View your attendance, results and study material.</p>
    <div class="admin-error" id="studentError"></div>
    <div class="admin-error" id="studentSuccess" style="background:rgba(90,140,70,.12); color:#3d6b2c; border-color:rgba(90,140,70,.3);"></div>

    <form id="studentLoginForm">
      <div class="field"><label for="stuLoginEmail">Email</label><input id="stuLoginEmail" type="email" required autocomplete="username"></div>
      <div class="field"><label for="stuLoginPass">Password</label><input id="stuLoginPass" type="password" required autocomplete="current-password"></div>
      <button type="submit" class="btn btn-gold" style="width:100%;">Log In</button>
      <p class="form-note" style="margin-top:12px;">
        <a href="#" id="showForgotBtn">Forgot password?</a> ·
        <a href="#" id="showRegisterBtn">New here? Register</a>
      </p>
    </form>

    <form id="studentRegisterForm" style="display:none;">
      <div class="field"><label for="stuRegName">Full Name</label><input id="stuRegName" required></div>
      <div class="field"><label for="stuRegEmail">Email</label><input id="stuRegEmail" type="email" required></div>
      <div class="field"><label for="stuRegPhone">Phone</label><input id="stuRegPhone"></div>
      <div class="field"><label for="stuRegPass">Password (min 8 characters)</label><input id="stuRegPass" type="password" minlength="8" required></div>
      <button type="submit" class="btn btn-gold" style="width:100%;">Create Account</button>
      <p class="form-note" style="margin-top:12px;"><a href="#" id="showLoginFromRegisterBtn">Back to login</a></p>
    </form>

    <form id="studentForgotForm" style="display:none;">
      <div class="field"><label for="stuForgotEmail">Email</label><input id="stuForgotEmail" type="email" required></div>
      <button type="submit" class="btn btn-gold" style="width:100%;">Send Reset Code</button>
      <p class="form-note" style="margin-top:12px;"><a href="#" id="showLoginFromForgotBtn">Back to login</a></p>
    </form>

    <form id="studentResetForm" style="display:none;">
      <div class="field"><label for="stuResetOtp">6-digit code (check your email)</label><input id="stuResetOtp" maxlength="6" required></div>
      <div class="field"><label for="stuResetNewPass">New Password (min 8 characters)</label><input id="stuResetNewPass" type="password" minlength="8" required></div>
      <button type="submit" class="btn btn-gold" style="width:100%;">Reset Password</button>
    </form>
  </div>
